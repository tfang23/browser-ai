<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .header-title { color: #58a6ff; font-weight: 600; }
        .token-pill {
            background: #238636;
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
        }
        .token-pill:hover { background: #2ea043; }
        .token-pill.warning { background: #d29922; }
        .token-pill.danger { background: #da3633; }
        .terminal {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        .line {
            margin-bottom: 2px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .line.welcome { color: #8b949e; margin-bottom: 12px; }
        .timestamp { color: #6e7681; font-size: 12px; margin-right: 8px; }
        .prompt { color: #7ee787; margin-right: 8px; }
        .input-line { color: #c9d1d9; }
        .output { color: #c9d1d9; }
        .output.success { color: #7ee787; }
        .output.error { color: #f85149; }
        .output.warning { color: #ffa657; }
        .output.info { color: #58a6ff; }
        .output.dim { color: #8b949e; }
        .input-area {
            background: #161b22;
            border-top: 1px solid #30363d;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: #c9d1d9;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            caret-color: #7ee787;
        }
        .input-field::placeholder { color: #484f58; }
        .input-field:disabled { opacity: 0.5; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <span class="header-title">browser-ai</span>
            <span style="margin-left: 8px; color: #484f58;">~</span>
        </div>
        <div class="token-pill" id="tokenPill" onclick="addTokens()">
            <span id="tokenCount">300</span> tk +
        </div>
    </div>
    
    <div class="terminal" id="terminal">
        <div class="line welcome">
Long-horizon browser tasks:
  • Monitor prices, reservations, inventory
  • Execute when available
  • Pay only for what you use

Type a task. Press enter.
        </div>
    </div>
    
    <div class="input-area">
        <span class="prompt">$</span>
        <input type="text" class="input-field" id="input" placeholder="book french laundry for 4..." autofocus autocomplete="off">
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000';
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('input');
        const tokenPill = document.getElementById('tokenPill');
        let tokenCount = 300;
        let isProcessing = false;
        let sessionId = localStorage.getItem('bai_session') || generateId();
        let userId = localStorage.getItem('bai_user') || generateId();
        
        localStorage.setItem('bai_session', sessionId);
        localStorage.setItem('bai_user', userId);
        
        function generateId() {
            return Math.random().toString(36).substring(2, 15);
        }
        
        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter' && !isProcessing && input.value.trim()) {
                const text = input.value.trim();
                input.value = '';
                await processCommand(text);
            }
        });
        
        async function processCommand(text) {
            isProcessing = true;
            input.disabled = true;
            
            // Echo input
            addLine(`${getTime()} <span class="prompt">$</span> <span class="input-line">${escapeHtml(text)}</span>`);
            
            // Working message
            addLine(`${getTime()} <span class="output dim">→ checking... (come back later, this may take a moment)</span>`);
            
            try {
                const response = await fetch(`${API_URL}/chat/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        message: text,
                        session_id: sessionId
                    })
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                // Remove the "checking..." line
                removeLastLine();
                
                // Display response (handle line breaks)
                const formattedResponse = escapeHtml(data.response).replace(/\n/g, '<br>');
                let typeClass = 'output';
                if (data.state === 'asking_monitor') typeClass = 'output warning';
                else if (data.state === 'monitoring') typeClass = 'output success';
                else if (data.state === 'idle' && data.response.includes('Insufficient')) typeClass = 'output error';
                
                addLine(`${getTime()} <span class="${typeClass}">${formattedResponse}</span>`);
                
                // Handle actions/buttons
                if (data.actions && data.actions.length > 0) {
                    const actionHtml = data.actions.map(a => 
                        `<span style="color: #7ee787; cursor: pointer;" onclick="sendAction('${a.value}')">[${a.label}]</span>`
                    ).join(' ');
                    addLine(`${getTime()} <span class="output dim">${actionHtml}</span>`);
                }
                
                // Update session
                if (data.session_id) sessionId = data.session_id;
                
            } catch (error) {
                removeLastLine();
                addLine(`${getTime()} <span class="output error">Error: ${escapeHtml(error.message)}</span>`);
                addLine(`${getTime()} <span class="output dim">Is the backend running on localhost:8000?</span>`);
            }
            
            isProcessing = false;
            input.disabled = false;
            input.focus();
        }
        
        async function sendAction(value) {
            input.value = value;
            input.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter' }));
        }
        
        function addLine(html) {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = html;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        function removeLastLine() {
            const lines = terminal.querySelectorAll('.line');
            if (lines.length > 0) {
                const last = lines[lines.length - 1];
                if (last.textContent.includes('checking')) last.remove();
            }
        }
        
        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }
        
        function updateTokens() {
            document.getElementById('tokenCount').textContent = tokenCount;
            if (tokenCount < 50) tokenPill.className = 'token-pill danger';
            else if (tokenCount < 150) tokenPill.className = 'token-pill warning';
            else tokenPill.className = 'token-pill';
        }
        
        function addTokens() {
            tokenCount += 1000;
            updateTokens();
            addLine(`${getTime()} <span class="output success">+1000 tokens added (demo only)</span>`);
        }
        
        // Expose for inline onclick
        window.sendAction = sendAction;
        window.addTokens = addTokens;
        
        // Focus input
        input.focus();
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.token-pill')) input.focus();
        });
    </script>
</body>
</html>
