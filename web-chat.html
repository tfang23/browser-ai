<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser AI - Web Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #1c1c1e;
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 17px;
            font-weight: 600;
        }
        
        .token-badge {
            background: #5856d6;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        .message {
            margin-bottom: 16px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            margin-left: auto;
            text-align: right;
        }
        
        .message.bot {
            margin-right: auto;
        }
        
        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            display: inline-block;
            text-align: left;
        }
        
        .message.user .message-bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot .message-bubble {
            background: #e5e5ea;
            color: #1c1c1e;
            border-bottom-left-radius: 4px;
        }
        
        .message.bot .message-bubble.system {
            background: #f0f0f5;
            font-style: italic;
            color: #8e8e93;
        }
        
        .message-time {
            font-size: 11px;
            color: #8e8e93;
            margin-top: 4px;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e5e5ea;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #8e8e93;
            border-radius: 50%;
            animation: bounce 1.4s ease infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        
        .input-area {
            background: white;
            border-top: 0.5px solid #e5e5ea;
            padding: 12px 20px 30px;
        }
        
        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .input-field {
            flex: 1;
            background: #f2f2f7;
            border: none;
            border-radius: 20px;
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            outline: none;
        }
        
        .input-field::placeholder {
            color: #8e8e93;
        }
        
        .send-btn {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .send-btn:disabled {
            background: #c7c7cc;
        }
        
        .quick-prompts {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            margin-bottom: 8px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .quick-prompt {
            background: #f2f2f7;
            border: none;
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 13px;
            color: #007aff;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        
        .quick-prompt:hover {
            background: #e5e5ea;
        }
        
        /* Result card in chat */
        .result-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-top: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            max-width: 100%;
        }
        
        .result-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 8px;
            color: #1c1c1e;
        }
        
        .result-content {
            font-size: 14px;
            color: #3a3a3c;
            line-height: 1.5;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border-radius: 16px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .action-btn:hover {
            opacity: 0.8;
        }
        
        .action-btn.primary {
            background: #007aff;
            color: white;
        }
        
        .action-btn.secondary {
            background: #e5e5ea;
            color: #1c1c1e;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
        }
        
        .status-badge.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-badge.pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌐 Browser AI</h1>
        <span class="token-badge">300 tokens</span>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <!-- Welcome message -->
        <div class="message bot">
            <div class="message-bubble">
                👋 Hi! I'm your AI web agent. Tell me what you need and I'll browse the web for you.
            </div>
            <div class="message-time">Just now</div>
        </div>
    </div>
    
    <div class="input-area">
        <div class="quick-prompts" id="quickPrompts">
            <button class="quick-prompt" onclick="sendQuickPrompt('Book a table at French Laundry')">🍽️ Book French Laundry</button>
            <button class="quick-prompt" onclick="sendQuickPrompt('Get Taylor Swift tickets')">🎫 Taylor Swift tickets</button>
            <button class="quick-prompt" onclick="sendQuickPrompt('Buy Nike Dunk Lows')">👟 Nike Dunks</button>
            <button class="quick-prompt" onclick="sendQuickPrompt('Find cheap flights to Tokyo')">✈️ Cheap flights to Tokyo</button>
        </div>
        
        <div class="input-container">
            <textarea class="input-field" id="messageInput" rows="1" placeholder="What can I help you with?" onkeydown="handleKeyDown(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
        </div>
    </div>
    
    <script>
        let conversationState = 'idle'; // idle, executing, asking_monitor, asking_details, confirming
        let lastTaskResult = null;
        let pendingTaskConfig = {};
        
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function sendQuickPrompt(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            // Add user message
            addMessage(text, 'user');
            input.value = '';
            input.rows = 1;
            
            // Show typing indicator
            showTyping();
            
            // Process based on conversation state
            await processUserInput(text);
        }
        
        function addMessage(text, sender, extraHTML = '') {
            const container = document.getElementById('chatContainer');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            let bubbleContent = text;
            if (extraHTML) {
                bubbleContent += extraHTML;
            }
            
            messageDiv.innerHTML = `
                <div class="message-bubble">${bubbleContent}</div>
                <div class="message-time">${time}</div>
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        async function processUserInput(text) {
            const lowerText = text.toLowerCase();
            
            // State: asking if user wants to monitor
            if (conversationState === 'asking_monitor') {
                removeTyping();
                if (lowerText.includes('yes') || lowerText.includes('sure') || lowerText.includes('monitor')) {
                    conversationState = 'asking_details';
                    addMessage("Great! I'll monitor for you. A few quick questions:", 'bot');
                    setTimeout(() => {
                        addMessage("How often should I check?\n• Every 5 minutes (fast, uses more tokens)\n• Every 30 minutes (balanced)\n• Every hour (slow, saves tokens)", 'bot');
                    }, 500);
                } else {
                    conversationState = 'idle';
                    addMessage("No problem! I'm here if you need anything else. Just let me know!", 'bot');
                }
                return;
            }
            
            // State: asking for frequency
            if (conversationState === 'asking_details') {
                removeTyping();
                let frequency = 30; // default
                if (lowerText.includes('5')) frequency = 5;
                else if (lowerText.includes('30')) frequency = 30;
                else if (lowerText.includes('hour')) frequency = 60;
                
                pendingTaskConfig.frequency = frequency;
                conversationState = 'asking_duration';
                
                addMessage(`Got it - checking every ${frequency} minutes. How long should I keep monitoring?\n• 1 day\n• 7 days\n• 14 days`, 'bot');
                return;
            }
            
            // State: asking for duration
            if (conversationState === 'asking_duration') {
                removeTyping();
                let days = 7; // default
                if (lowerText.includes('1')) days = 1;
                else if (lowerText.includes('7')) days = 7;
                else if (lowerText.includes('14')) days = 14;
                
                pendingTaskConfig.duration = days;
                conversationState = 'confirming';
                
                // Calculate estimated tokens
                const estimatedTokens = Math.ceil((days * 24 * 60 / pendingTaskConfig.frequency) * 50);
                pendingTaskConfig.estimatedTokens = estimatedTokens;
                
                addMessage(`Perfect! Here's what I'll do:

✓ Check every ${pendingTaskConfig.frequency} minutes
✓ Monitor for ${days} days  
✓ Use approximately ${estimatedTokens} tokens

This will cost about $${(estimatedTokens * 0.01).toFixed(2)}. Ready to start? (yes/no)`, 'bot');
                return;
            }
            
            // State: confirming task creation
            if (conversationState === 'confirming') {
                removeTyping();
                if (lowerText.includes('yes') || lowerText.includes('sure') || lowerText.includes('ok')) {
                    // Create the persistent task
                    await createPersistentTask();
                } else {
                    conversationState = 'idle';
                    addMessage("Cancelled. Let me know if you want to try a different configuration!", 'bot');
                }
                return;
            }
            
            // Default: execute the task
            await executeTask(text);
        }
        
        async function executeTask(prompt) {
            try {
                // Simulate API call to execute task
                // In production: await fetch('/api/execute', { method: 'POST', body: JSON.stringify({ prompt }) });
                
                await simulateDelay(2000);
                removeTyping();
                
                // Simulate a result based on the prompt
                let result = simulateTaskResult(prompt);
                lastTaskResult = result;
                
                // Show result with option to monitor
                const resultHTML = `
                    <div class="result-card">
                        <div class="result-title">🔍 Task Result</div>
                        <div class="result-content">${result.summary}</div>
                        <span class="status-badge ${result.success ? 'success' : 'pending'}">${result.status}</span>
                    </div>
                    <div style="margin-top: 12px;">${result.success ? 
                        'Would you like me to <strong>monitor continuously</strong> and book it when available?' : 
                        'Would you like me to <strong>keep checking</strong> for you?'}</div>
                    <div class="action-buttons">
                        <button class="action-btn primary" onclick="respondYes()">Yes, monitor it</button>
                        <button class="action-btn secondary" onclick="respondNo()">No thanks</button>
                    </div>
                `;
                
                addMessage('', 'bot', resultHTML);
                conversationState = 'asking_monitor';
                pendingTaskConfig.originalPrompt = prompt;
                
            } catch (error) {
                removeTyping();
                addMessage(`Sorry, I encountered an error: ${error.message}`, 'bot');
                conversationState = 'idle';
            }
        }
        
        function simulateTaskResult(prompt) {
            const lower = prompt.toLowerCase();
            
            if (lower.includes('french laundry') || lower.includes('restaurant')) {
                return {
                    success: false,
                    status: 'Sold out',
                    summary: 'Checked The French Laundry availability. Currently fully booked for the next 30 days. Waitlist available for cancellations.'
                };
            } else if (lower.includes('taylor swift') || lower.includes('ticket')) {
                return {
                    success: false,
                    status: 'Not on sale yet',
                    summary: 'Taylor Swift Eras Tour - San Francisco show. Tickets go on sale March 15 at 10 AM. Verified Fan registration required.'
                };
            } else if (lower.includes('nike') || lower.includes('dunk')) {
                return {
                    success: false,
                    status: 'Out of stock',
                    summary: 'Nike Dunk Low "Panda" - Currently out of stock at Nike.com and most retailers. Restocks typically happen Thursday mornings.'
                };
            } else if (lower.includes('flight') || lower.includes('tokyo')) {
                return {
                    success: true,
                    status: 'Found flights!',
                    summary: 'Found flights JFK → NRT (Tokyo):\n• United: $789 (Mar 15-22)\n• ANA: $845 (Mar 16-23)\n• Japan Airlines: $899 (Mar 14-21)'
                };
            } else {
                return {
                    success: false,
                    status: 'Checking...',
                    summary: 'I searched for: "' + prompt + '". The results depend on availability. Would you like me to monitor for changes?'
                };
            }
        }
        
        function respondYes() {
            document.getElementById('messageInput').value = 'yes';
            sendMessage();
        }
        
        function respondNo() {
            document.getElementById('messageInput').value = 'no';
            sendMessage();
        }
        
        async function createPersistentTask() {
            showTyping();
            
            // Simulate API call to create persistent task
            await simulateDelay(1500);
            removeTyping();
            
            addMessage(`✅ <strong>Task created!</strong>\n\nI'm now monitoring every ${pendingTaskConfig.frequency} minutes for the next ${pendingTaskConfig.duration} days. I'll notify you as soon as I find what you're looking for.\n\nThis will use approximately ${pendingTaskConfig.estimatedTokens} tokens from your balance.`, 'bot');
            
            conversationState = 'idle';
            pendingTaskConfig = {};
            
            // Show quick prompts again
            setTimeout(() => {
                addMessage("What else can I help you with?", 'bot');
            }, 1000);
        }
        
        function simulateDelay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.rows = 1;
            const lines = this.value.split('\n').length;
            this.rows = Math.min(lines, 5);
        });
    </script>
</body>
</html>
